name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0). If empty, uses the current Cargo.toml version.'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows Installers
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # Build NSIS + MSI bundles with updater signing.
      # TAURI_SIGNING_PRIVATE_KEY is required for the updater to generate
      # signed bundles and a latest.json manifest.
      - name: Build Tauri app (NSIS + MSI)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build

      - name: Copy portable EXE
        shell: bash
        run: |
          cp "src-tauri/target/release/device-manager-pp.exe" "src-tauri/target/release/Device Manager++.exe"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="v$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # Collect all release artifacts into a single directory.
      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          mkdir -p release-artifacts

          # NSIS installer (.exe) and its signature
          for f in src-tauri/target/release/bundle/nsis/*.exe; do
            cp "$f" release-artifacts/
          done
          for f in src-tauri/target/release/bundle/nsis/*.exe.sig; do
            cp "$f" release-artifacts/ 2>/dev/null || true
          done

          # MSI installer and its signature
          for f in src-tauri/target/release/bundle/msi/*.msi; do
            cp "$f" release-artifacts/
          done
          for f in src-tauri/target/release/bundle/msi/*.msi.sig; do
            cp "$f" release-artifacts/ 2>/dev/null || true
          done

          # Portable EXE
          cp "src-tauri/target/release/Device Manager++.exe" release-artifacts/

          # Updater manifest (latest.json) — generated by Tauri when signing is enabled.
          # It may be in the nsis or msi bundle directory.
          for dir in src-tauri/target/release/bundle/nsis src-tauri/target/release/bundle/msi; do
            if [[ -f "$dir/latest.json" ]]; then
              cp "$dir/latest.json" release-artifacts/latest.json
              break
            fi
          done

          echo "--- Release artifacts ---"
          ls -la release-artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="v$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Device Manager++ ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
