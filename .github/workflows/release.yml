name: Release MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0). If empty, uses the current Cargo.toml version.'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-msi:
    name: Build Windows MSI Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (MSI)
        run: cargo tauri build --bundles msi

      - name: Copy portable EXE
        shell: bash
        run: |
          cp src-tauri/target/release/device-manager-pp.exe "src-tauri/target/release/Device Manager++.exe"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="v$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Find MSI artifact
        id: find-msi
        shell: bash
        run: |
          MSI_PATH=$(find src-tauri/target/release/bundle/msi -name '*.msi' | head -1)
          MSI_NAME=$(basename "$MSI_PATH")
          echo "msi_path=$MSI_PATH" >> "$GITHUB_OUTPUT"
          echo "msi_name=$MSI_NAME" >> "$GITHUB_OUTPUT"
          echo "Found MSI: $MSI_PATH"

      - name: Upload MSI as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-manager-pp-msi
          path: ${{ steps.find-msi.outputs.msi_path }}
          if-no-files-found: error

      - name: Upload portable EXE as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-manager-pp-portable
          path: "src-tauri/target/release/Device Manager++.exe"
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-msi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="v$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: device-manager-pp-msi
          path: artifacts/

      - name: Download portable EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: device-manager-pp-portable
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Device Manager++ ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*.msi
            artifacts/*.exe
